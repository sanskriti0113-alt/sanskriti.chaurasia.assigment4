<!DOCTYPE html>
<html>
<head>
    <title>JS Assignment</title>
</head>
<body>

<h1>Assignment</h1>

<button onclick="q1()">Question 1</button>
<button onclick="q2()">Question 2</button>
<button onclick="q3()">Question 3</button>
<button onclick="q4()">Question 4</button>
<button onclick="q5()">Question 5</button>
<button onclick="q6()">Question 6</button>

<script>

function q1() {
    var l = prompt("Enter L");
    var r = prompt("Enter R");
    var k = prompt("Enter K");

    var count = 0;

    for (var i = l; i <= r; i++) {
        if (i % k == 0) {
            var num = i;
            var sum = 0;
            var zero = false;

            while (num > 0) {
                var d = num % 10;
                if (d == 0) {
                    zero = true;
                    break;
                }
                sum = sum + d;
                num = (num - d) / 10;
            }

            var prime = true;
            if (sum < 2) prime = false;

            for (var j = 2; j < sum; j++) {
                if (sum % j == 0) {
                    prime = false;
                    break;
                }
            }

            if (prime && !zero) {
                count++;
            }
        }
    }

    alert(count);
}

function q2() {
    var n = prompt("Enter N");
    var seed = prompt("Enter seed");

    var cur = n;

    for (var i = 1; i <= 3; i++) {
        if (cur % 2 == 0) {
            cur = cur / 2 + seed;
        } else {
            cur = cur * 3 - seed;
        }
    }

    var temp = cur;
    var mid = 0;

    if (temp >= 100 && temp <= 999) {
        mid = ((temp - (temp % 10)) / 10) % 10;
    }

    if (cur >= 100 && cur <= 999 && mid == seed) {
        alert("YES, " + cur);
    } else {
        alert("NO, " + cur);
    }
}

function q3() {
    var n = prompt("Enter N");
    var k = prompt("Enter K");

    var ans = -1;

    for (var x = 0; x <= 100000; x++) {
        var num = n + x;

        var temp = num;
        var rev = 0;

        while (temp > 0) {
            var d = temp % 10;
            rev = rev * 10 + d;
            temp = (temp - d) / 10;
        }

        if (num == rev && num % k == 0) {
            ans = x;
            break;
        }
    }

    alert(ans);
}

function q4() {
    var base = prompt("Enter base");
    var dist = prompt("Enter distance");
    var late = prompt("Enter minutes late");
    var seed = prompt("Enter seed");

    var fare = base + 7 * dist;

    if (late > 15) {
        fare = fare + 20;
    }

    if (dist > 10) {
        fare = fare + (fare * 10) / 100;
    }

    if (seed % 2 == 1) {
        fare = fare - seed;
    } else {
        fare = fare + seed;
    }

    while (fare % 5 != 0) {
        fare++;
    }

    alert(fare);
}

function q5() {
    var n = prompt("Enter N");
    var seed = prompt("Enter seed");

    var m = 0;
    var sum = 0;
    var skip = seed + 2;

    while (sum < n) {
        m++;
        if (m % skip != 0) {
            sum = sum + m;
        }
    }

    alert(m + " " + sum);
}

function q6() {
    var a = prompt("Enter correct answers");
    var b = prompt("Enter partial answers");
    var c = prompt("Enter wrong answers");

    var score = 3 * a + b - 2 * c;

    if (score < 0) {
        score = 0;
    }

    if (a + b + c > 50) {
        score = score - 10;
    }

    if (score >= 60) {
        alert(score + ", PASS");
    } else {
        alert(score + ", FAIL");
    }
}

</script>

</body>
</html>
